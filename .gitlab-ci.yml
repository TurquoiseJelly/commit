stages:
  - build
  - deploy

default:
  image: node:20-alpine

build:
  stage: build
  script:
    - npm ci
    - npm audit --audit-level=moderate
    - npm run validate
    - sed -i 's|baseUrl:.*|baseUrl: "'"${CI_PAGES_URL}"'/"|' config.yaml
    - npm run build
  artifacts:
    paths:
      - dist

pages:
  stage: deploy
  needs:
    - build
  script:
    - mv dist public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
