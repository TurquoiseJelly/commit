site:
  title: "FlatPress"
  description: "A lightweight, Git-backed, Markdown-driven static site."
  # Set to an absolute URL (e.g. "https://example.com/") for deployment — required for feed, sitemap, and canonical URLs
  baseUrl: "/"
  language: "en"
theme: "midnight"
blog:
  postsPerPage: 5
  feedLimit: 20
build:
  contentDir: "content"
  outputDir: "dist"
  staticDir: "static"
