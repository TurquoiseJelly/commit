<!DOCTYPE html>
<html lang="{{site.language}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{description}}">
  <title>{{title}} - {{site.title}}</title>
  {{#if canonicalUrl}}<link rel="canonical" href="{{canonicalUrl}}">{{/if}}
  <meta property="og:title" content="{{title}}">
  {{#if description}}<meta property="og:description" content="{{description}}">{{/if}}
  {{#if canonicalUrl}}<meta property="og:url" content="{{canonicalUrl}}">{{/if}}
  <meta property="og:type" content="{{ogType}}">
  <meta property="og:site_name" content="{{site.title}}">
  <link rel="stylesheet" href="{{site.baseUrl}}assets/css/style.css">
  <link rel="alternate" type="application/atom+xml" title="{{site.title}} Feed" href="{{site.baseUrl}}feed.xml">
</head>
<body>
  <header class="mn-header">
    <nav>
      <a href="{{site.baseUrl}}" class="mn-site-title">{{site.title}}</a>
      <ul>
        <li><a href="{{site.baseUrl}}">Home</a></li>
        <li><a href="{{site.baseUrl}}blog/">Blog</a></li>
        <li><a href="{{site.baseUrl}}about.html">About</a></li>
      </ul>
    </nav>
  </header>
  <main>
    {{{body}}}
  </main>
  <footer class="mn-footer">
    <p>&copy; 2026 {{site.title}}. Powered by FlatPress.</p>
  </footer>
</body>
</html>
