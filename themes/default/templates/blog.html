<article class="post">
  <header class="post-header">
    <h1>{{title}}</h1>
    <div class="post-meta">
      <time>{{formatDate date}}</time>
      {{#if author}}<span class="author">by {{author}}</span>{{/if}}
    </div>
    {{#if tags.length}}
    <div class="tags">
      {{#each tags}}<span class="tag">{{this}}</span>{{/each}}
    </div>
    {{/if}}
  </header>
  <div class="post-content">
    {{{content}}}
  </div>
</article>
